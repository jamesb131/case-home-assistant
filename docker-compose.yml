services:
  db:
    image: postgres:15
    container_name: case-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-case}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-case}
      POSTGRES_DB: ${POSTGRES_DB:-case}
    ports:
      - "5432:5432"
    volumes:
      - case_data:/var/lib/postgresql/data

  api:
    build: ./api
    container_name: case-api
    ports:
      - "8000:8000"
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-case}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-case}
      POSTGRES_DB: ${POSTGRES_DB:-case}
      POSTGRES_HOST: ${POSTGRES_HOST:-db}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      GOOGLE_CALENDAR_ID: ${GOOGLE_CALENDAR_ID:-08d8bae9a07144d268a0e3d89f8bb525d49565c664142f4d97fcca1c78dd010f@group.calendar.google.com}
      OLLAMA_URL: ${OLLAMA_URL:-http://host.docker.internal:11434/api/chat}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.1:8b}
      OLLAMA_STATUS_TIMEOUT: ${OLLAMA_STATUS_TIMEOUT:-2}
      OLLAMA_CHAT_TIMEOUT: ${OLLAMA_CHAT_TIMEOUT:-60}
      CASE_CORS_ORIGINS: ${CASE_CORS_ORIGINS:-http://localhost:5173,http://localhost:8080}
      CASE_API_TOKEN: ${CASE_API_TOKEN:-}
    volumes:
      - ./api/app/google:/app/app/google

  web:
    build: ./web
    container_name: case-web
    ports:
      - "8080:80"
    depends_on:
      - api
    environment:
      CASE_WEB_API_BASE_URL: ${CASE_WEB_API_BASE_URL:-}
      CASE_WEB_API_TOKEN: ${CASE_WEB_API_TOKEN:-}

  worker:
    build: ./api
    container_name: case-worker
    command: ["python", "-m", "app.worker"]
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-case}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-case}
      POSTGRES_DB: ${POSTGRES_DB:-case}
      POSTGRES_HOST: ${POSTGRES_HOST:-db}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      LOG_INTERVAL: ${LOG_INTERVAL:-30}
      WEATHER_POLL_INTERVAL: ${WEATHER_POLL_INTERVAL:-900}
      CALENDAR_POLL_INTERVAL: ${CALENDAR_POLL_INTERVAL:-900}
      BINS_POLL_INTERVAL: ${BINS_POLL_INTERVAL:-3600}
      STATUS_POLL_INTERVAL: ${STATUS_POLL_INTERVAL:-60}
      RETENTION_INTERVAL: ${RETENTION_INTERVAL:-86400}
      RECURRING_TASK_INTERVAL: ${RECURRING_TASK_INTERVAL:-3600}
      RECURRING_TASK_DAYS_AHEAD: ${RECURRING_TASK_DAYS_AHEAD:-21}
      ENERGY_RETENTION_DAYS: ${ENERGY_RETENTION_DAYS:-0}
      GOOGLE_CALENDAR_ID: ${GOOGLE_CALENDAR_ID:-08d8bae9a07144d268a0e3d89f8bb525d49565c664142f4d97fcca1c78dd010f@group.calendar.google.com}
      PYTHONUNBUFFERED: 1
    volumes:
      - ./api/app/google:/app/app/google

  migrate:
    build: ./api
    container_name: case-migrate
    command: ["python", "-m", "app.migrations"]
    depends_on:
      - db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-case}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-case}
      POSTGRES_DB: ${POSTGRES_DB:-case}
      POSTGRES_HOST: ${POSTGRES_HOST:-db}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}

volumes:
  case_data:
