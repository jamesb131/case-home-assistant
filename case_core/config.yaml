name: CASE Core
version: "0.1.26"
slug: case_core
description: Local-first household assistant API, worker and web UI.
url: https://github.com/jamesb131/case-home-assistant
arch:
  - aarch64
  - amd64
startup: application
boot: auto
stage: stable
init: false
legacy: true
image: ghcr.io/jamesb131/case-home-assistant/case-core
webui: http://[HOST]:[PORT:80]
watchdog: http://[HOST]:[PORT:8000]/health
ports:
  80/tcp: 8080
  8000/tcp: 8000
ports_description:
  80/tcp: CASE web UI
  8000/tcp: CASE API
map:
  - type: share
    read_only: false
options:
  postgres_host: 2e435b46-case-postgres
  postgres_port: 5432
  postgres_user: case
  postgres_password: change-this-before-deploying
  postgres_db: case
  google_calendar_id: 08d8bae9a07144d268a0e3d89f8bb525d49565c664142f4d97fcca1c78dd010f@group.calendar.google.com
  google_import_dir: /share/case/google
  ollama_url: http://desktop-pc.local:11435/api/chat
  ollama_model: llama3.1:8b
  ollama_status_timeout: 2
  ollama_chat_timeout: 60
  case_cors_origins: http://case.local:8080,http://homeassistant.local:8080,http://192.168.0.154:8080
  case_api_token: ""
  case_web_api_base_url: /api
  case_web_api_token: ""
  log_interval: 30
  weather_poll_interval: 900
  calendar_poll_interval: 900
  bins_poll_interval: 3600
  status_poll_interval: 60
  retention_interval: 86400
  recurring_task_interval: 3600
  recurring_task_days_ahead: 21
  energy_retention_days: 0
  sigenergy_host: 192.168.0.2
  sigenergy_port: 502
  gaggimate_host: 192.168.0.116
  gaggimate_ws_protocol: ws
  gaggimate_timeout: 3
  gaggimate_poll_interval: 60
  home_assistant_url: http://homeassistant.local:8123
  home_assistant_token: ""
  ev_power_entity_id: sensor.sigen_plant_smart_load_1_power
  ev_total_consumption_entity_id: sensor.sigen_plant_smart_load_1_total_consumption
  ev_charging_threshold_kw: 0.3
  roborock_vacuum_entity_id: ""
  roborock_battery_entity_id: ""
  roborock_route_entities: "{}"
  roborock_poll_interval: 60
  airtouch_backend: auto
  airtouch_host: ""
  airtouch_ac_entity_id: climate.ac_0
  airtouch_zone_entities: '{"Living":"climate.living","James & Chris":"climate.james_chris","Leo":"climate.leo","Benny":"climate.benny","Lounge":"climate.lounge","Study":"climate.study","Cinema":"climate.cinema","Guest":"climate.guest"}'
  news_feeds: "ABC News|https://www.abc.net.au/news/feed/51120/rss.xml"
  news_refresh_interval_seconds: 1800
schema:
  postgres_host: str
  postgres_port: port
  postgres_user: str
  postgres_password: password
  postgres_db: str
  google_calendar_id: str
  google_import_dir: str
  ollama_url: url
  ollama_model: str
  ollama_status_timeout: int(1,30)
  ollama_chat_timeout: int(5,300)
  case_cors_origins: str
  case_api_token: password?
  case_web_api_base_url: str
  case_web_api_token: password?
  log_interval: int(5,)
  weather_poll_interval: int(60,)
  calendar_poll_interval: int(60,)
  bins_poll_interval: int(60,)
  status_poll_interval: int(10,)
  retention_interval: int(3600,)
  recurring_task_interval: int(60,)
  recurring_task_days_ahead: int(1,90)
  energy_retention_days: int(0,)
  sigenergy_host: str
  sigenergy_port: port
  gaggimate_host: str
  gaggimate_ws_protocol: list(ws|wss)
  gaggimate_timeout: int(1,30)
  gaggimate_poll_interval: int(30,)
  home_assistant_url: url
  home_assistant_token: password?
  ev_power_entity_id: str?
  ev_total_consumption_entity_id: str?
  ev_charging_threshold_kw: float(0,)
  roborock_vacuum_entity_id: str?
  roborock_battery_entity_id: str?
  roborock_route_entities: str
  roborock_poll_interval: int(30,)
  airtouch_backend: list(auto|direct|home_assistant)
  airtouch_host: str?
  airtouch_ac_entity_id: str?
  airtouch_zone_entities: str
  news_feeds: str
  news_refresh_interval_seconds: int(300,)
