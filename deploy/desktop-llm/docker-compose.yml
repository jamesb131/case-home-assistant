services:
  case-llm-bridge:
    build:
      context: ../..
      dockerfile: deploy/desktop-llm/Dockerfile
    container_name: case-llm-bridge
    restart: unless-stopped
    ports:
      - "11435:11435"
    environment:
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.1:8b}
      OLLAMA_STATUS_TIMEOUT: ${OLLAMA_STATUS_TIMEOUT:-2}
      OLLAMA_CHAT_TIMEOUT: ${OLLAMA_CHAT_TIMEOUT:-60}
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:-10m}
      OLLAMA_WARMUP_INTERVAL: ${OLLAMA_WARMUP_INTERVAL:-300}
      CASE_LLM_ALLOWED_CLIENTS: ${CASE_LLM_ALLOWED_CLIENTS:-}
