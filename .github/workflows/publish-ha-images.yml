name: Publish Home Assistant Images

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - api/**
      - web/**
      - deploy/ha/**
      - case_core/config.yaml
      - case_postgres/config.yaml
      - case_https_proxy/**
      - scripts/build-ha-images.sh
      - .github/workflows/publish-ha-images.yml

permissions:
  contents: read
  packages: write

env:
  CASE_HA_IMAGE_REGISTRY: ghcr.io/jamesb131/case-home-assistant
  CASE_HA_IMAGE_PLATFORMS: linux/arm64,linux/amd64

jobs:
  publish:
    name: Build and push HA images
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: jamesb131
          password: ${{ secrets.GHCR_PAT || secrets.GITHUB_TOKEN }}

      - name: Build and push images
        run: scripts/build-ha-images.sh push
